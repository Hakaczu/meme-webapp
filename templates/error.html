<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Tinder – Error</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/styles.css') }}">
</head>
<body>

<div id="layout">
    <div class="sidebar">
        <div class="brand">
            <h1 class="brand-title">Meme Tinder</h1>
            <p class="brand-tagline">via <a href="https://github.com/D3vd/Meme_Api" target="_blank">D3vd/Meme_Api</a></p>
        </div>

        <div class="sidebar-footer">
            <a href="https://github.com/Hakaczu/meme-webapp" target="_blank">GitHub</a>
        </div>
    </div>

    <div class="content">
        <div class="card-stack">
            <div class="meme-card entering">
                <div class="card-image">
                    <img src="{{ url_for('static', filename='img/error.jpg') }}" alt="error">
                    <div class="card-overlay">
                        <span class="subreddit-badge">r/oops</span>
                        <h2 class="meme-title">API Error</h2>
                        <p class="meme-author">Something went wrong – try again</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="vote-btn vote-like" onclick="window.location.reload()">
                <span class="btn-icon">↻</span>
            </button>
        </div>
    </div>
</div>

</body>
</html>
